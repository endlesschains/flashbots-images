# GitHub Actions workflow for building mkosi images using Nix.
#
# Triggers on:
# - Pushes to main branch: Builds all images (bob-l1, bob-l2) in parallel
#
# - Manual dispatch: Allows specifying:
#   - Branch to build from (default: main)
#   - Images to build (default: bob-l1)
#     - "all" → builds bob-l1 and bob-l2
#     - "bob-l1" → builds only bob-l1
#     - "bob-l2" → builds only bob-l2
#     - "bob-l1,bob-l2" → builds both

name: Build mkosi images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: 'main'
        type: string
      images:
        description: 'Images to build (comma-separated: bob-l1,bob-l2 or "all")'
        required: false
        default: 'bob-l1'
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix based on input
        id: set-matrix
        run: |
          # Default images for push events or when "all" is specified
          all_images='["bob-l1","bob-l2"]'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.images }}" != "all" ]; then
            # Convert comma-separated string to JSON array
            images="${{ inputs.images }}"
            # Remove spaces, split by comma, create JSON array
            json_array=$(echo "$images" | tr -d ' ' | jq -R -c 'split(",") | map(select(length > 0))')
            echo "matrix=$json_array" >> $GITHUB_OUTPUT
            echo "Building images: $json_array"
          else
            echo "matrix=$all_images" >> $GITHUB_OUTPUT
            echo "Building all images: $all_images"
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    name: build ${{ matrix.image }} image
    runs-on: warp-ubuntu-latest-x64-32x
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Install tools
        run: |
          sudo apt-get update && sudo apt-get install -y debian-archive-keyring

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Enable user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Build ${{ matrix.image }} image
        run: |
          umask 022
          nix develop --command mkosi --force -I ${{ matrix.image }}.conf --image-id=${{ matrix.image }}
